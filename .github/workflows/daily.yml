name: 每日生成

on:
  schedule:
    # 北京时间每天早上 8:00（UTC 0:00）
    - cron: "0 0 * * *"
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main
    paths:
      - "scripts/generate.py"
      - "scripts/topics.json"
      - ".github/workflows/daily.yml"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要 push 权限

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install openai

      - name: 生成文章
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_BASE: ${{ secrets.DEEPSEEK_API_BASE || 'https://api.deepseek.com' }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-chat' }}
        run: python scripts/generate.py

      - name: 构建索引
        run: python scripts/build.py

      - name: 提交变更
        run: |
          git config user.name "daily-brew[bot]"
          git config user.email "daily-brew[bot]@users.noreply.github.com"
          git add content/ web/posts.json web/content/
          if git diff --staged --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "📝 $(date +%Y-%m-%d) 每日更新"
            git push
          fi
